server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/spreetail_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Secret Key (for development - change in production)
jwt.secret=spreetail-secret-key-for-jwt-token-generation-and-validation
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:3000

# Application Name
spring.application.name=spreetail-expense-sharing