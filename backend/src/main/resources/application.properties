server.port=8080

# PostgreSQL Database Configuration
# Railway provides DATABASE_URL environment variable
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:spreetail_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# H2 Console (only for local development)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# JWT Configuration
jwt.secret=${JWT_SECRET:c3ByZWV0YWlsLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9uLWFuZC12YWxpZGF0aW9uLW11c3QtYmUtMjU2LWJpdHMtbG9uZw==}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS Configuration (comma-separated)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Application Name
spring.application.name=spreetail-expense-sharing

# Logging
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.spreetail=${LOG_LEVEL_APP:INFO}