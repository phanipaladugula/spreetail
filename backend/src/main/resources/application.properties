server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/spreetail_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:spreetail}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:spreetail123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (only for local development)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# JWT Configuration
jwt.secret=${JWT_SECRET:c3ByZWV0YWlsLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9uLWFuZC12YWxpZGF0aW9uLW11c3QtYmUtMjU2LWJpdHMtbG9uZw==}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS Configuration (comma-separated)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Application Name
spring.application.name=spreetail-expense-sharing

# Logging
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.spreetail=${LOG_LEVEL_APP:INFO}

# Load .env file automatically
spring.config.import=optional:file:.env[.properties]

# Email Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# App URL for email links
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}