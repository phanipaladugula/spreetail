<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Spreetail Text -->
  <text x="60" y="38" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="28" font-weight="700" fill="#1f2937">Spreetail</text>

  <!-- Accent Line -->
  <rect x="60" y="45" width="140" height="3" rx="1.5" fill="url(#gradient)" />

  <!-- Logo Icon -->
  <g>
    <!-- Main box -->
    <rect x="0" y="5" width="50" height="50" rx="8" fill="url(#gradient)" />
    <!-- S Shape -->
    <path d="M15 20 H20 C25 20 27 22 27 25 C27 28 25 30 22 30 L18 30 C15 30 13 32 13 35 C13 38 15 40 18 40 H35"
          stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>